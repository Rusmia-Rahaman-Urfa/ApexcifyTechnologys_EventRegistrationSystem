<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub | Engineering Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #a855f7; /* Vibrant Purple */
            --deep: #0f172a;   /* Deep Navy/Black */
            --panel: #1e1b4b;  /* Deep Indigo */
            --text-light: #f8fafc; 
        }
        body { 
            background-color: var(--deep); 
            color: var(--text-light); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(79, 70, 229, 0.1) 0%, transparent 40%);
        }
        .purple-glow { color: var(--accent); text-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
        .glass-panel { 
            background: rgba(30, 27, 75, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(168, 85, 247, 0.2); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }
        .loader { 
            width: 48px; height: 48px; border: 3px solid rgba(168, 85, 247, 0.1); 
            border-bottom-color: var(--accent); border-radius: 50%; 
            display: inline-block; animation: rotation 1s linear infinite; 
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .page-view { height: 100vh; width: 100vw; overflow-y: auto; }
        .hidden { display: none !important; }
        .swal2-popup { 
            background: #1e1b4b !important; 
            color: #fff !important; 
            border: 1px solid rgba(168, 85, 247, 0.3) !important;
        }
        .swal2-input, .swal2-textarea, .swal2-select { 
            background: rgba(15, 23, 42, 0.8) !important; 
            color: #fff !important; 
            border: 1px solid rgba(168, 85, 247, 0.2) !important;
        }
    </style>
</head>
<body>

    <div id="globalLoader" class="fixed inset-0 bg-[#0f172a] z-[100] flex flex-col items-center justify-center hidden">
        <span class="loader mb-4"></span>
        <p class="text-[10px] font-bold tracking-[0.3em] purple-glow uppercase">Encrypting Session</p>
    </div>

    <div id="landingPage" class="page-view flex items-center justify-center px-6">
        <div class="text-center max-w-md w-full">
            <div class="w-20 h-20 bg-purple-600 rounded-3xl flex items-center justify-center font-bold text-white mx-auto mb-10 shadow-2xl shadow-purple-500/20 text-3xl">E</div>
            <h1 class="text-4xl font-extrabold mb-10 tracking-tight">Event<span class="purple-glow">Hub</span></h1>
            <div class="glass-panel p-10 rounded-[2.5rem] space-y-6">
                <input id="userEmail" type="email" placeholder="Email Address" class="w-full bg-slate-900/50 border border-purple-500/20 rounded-2xl px-6 py-4 outline-none focus:border-purple-500 transition-all text-white">
                <input id="userPass" type="password" placeholder="Password" class="w-full bg-slate-900/50 border border-purple-500/20 rounded-2xl px-6 py-4 outline-none focus:border-purple-500 transition-all text-white">
                <button onclick="handleLogin()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-xs hover:bg-purple-500 shadow-xl shadow-purple-900/20 transition-all">Authenticate</button>
            </div>
        </div>
    </div>

    <div id="dashboardPage" class="page-view hidden">
        <nav class="border-b border-purple-500/10 px-8 py-6 flex justify-between items-center sticky top-0 bg-[#0f172a]/80 backdrop-blur-2xl z-50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center text-xs font-bold text-white">E</div>
                <span class="font-bold text-xl tracking-tighter uppercase">Event<span class="purple-glow">Hub</span></span>
            </div>
            <div class="flex gap-8 items-center">
                <button onclick="viewMyEvents()" class="text-[11px] font-bold uppercase text-slate-400 hover:text-purple-400 transition-colors">My Events</button>
                <button onclick="openAdmin()" class="text-[11px] font-bold uppercase text-slate-400 hover:text-purple-400 transition-colors">Admin</button>
                <button onclick="logout()" class="text-[11px] text-red-400 font-bold border border-red-400/20 px-6 py-2 rounded-full hover:bg-red-400/10 transition-all">Sign Out</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-8 py-12">
            <div class="flex flex-col md:flex-row justify-between items-end mb-16 border-b border-purple-500/10 pb-12">
                <div>
                    <h2 class="text-4xl font-extrabold tracking-tight mb-3">Live Engineering <span class="purple-glow">Sessions</span></h2>
                    <p id="userBadge" class="text-purple-400/60 text-[10px] font-bold uppercase tracking-[0.3em]">Node Secured</p>
                </div>
                <div class="w-full md:w-80 mt-8 md:mt-0">
                    <input id="searchInput" oninput="filterEvents()" type="text" placeholder="Filter by title..." class="w-full bg-purple-900/10 border border-purple-500/20 rounded-2xl px-6 py-4 text-sm outline-none focus:border-purple-500 transition-all">
                </div>
            </div>
            <div id="eventGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
        </main>
    </div>

    <script>
        const API = "http://localhost:5001/api"; 
        let allEvents = [];

        window.onload = () => {
            const savedEmail = localStorage.getItem('userEmail');
            if (savedEmail) { showDashboard(savedEmail); }
        };

        async function handleLogin() {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            if(!email || !pass) return Swal.fire('Error', 'Fill required fields', 'error');

            document.getElementById('globalLoader').classList.remove('hidden');
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass })
                });
                const auth = await res.json();
                if(auth.success) {
                    localStorage.setItem('userEmail', email);
                    setTimeout(() => {
                        document.getElementById('globalLoader').classList.add('hidden');
                        showDashboard(email);
                    }, 800);
                } else {
                    document.getElementById('globalLoader').classList.add('hidden');
                    Swal.fire({ icon: 'error', title: 'Fail', text: 'Check Credentials', confirmButtonColor: '#9333ea' });
                }
            } catch (err) { document.getElementById('globalLoader').classList.add('hidden'); }
        }

        function showDashboard(email) {
            document.getElementById('landingPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('userBadge').innerText = `Session: ${email}`;
            loadEvents();
        }

        function logout() { localStorage.removeItem('userEmail'); location.reload(); }

        async function loadEvents() {
            const res = await fetch(`${API}/events`);
            allEvents = await res.json();
            renderGrid(allEvents);
        }

        function renderGrid(data) {
            const grid = document.getElementById('eventGrid');
            grid.innerHTML = data.map(ev => `
                <div class="glass-panel p-8 rounded-[2rem] flex flex-col justify-between hover:border-purple-500/60 transition-all group hover:-translate-y-2">
                    <div>
                        <span class="px-4 py-1.5 bg-purple-500/10 text-purple-400 text-[9px] font-bold uppercase rounded-full tracking-[0.1em] border border-purple-500/20">${ev.category}</span>
                        <h3 class="text-xl font-bold my-5 group-hover:text-purple-400 transition-colors">${ev.title}</h3>
                        <p class="text-slate-400 text-xs leading-relaxed mb-10 line-clamp-3">${ev.description}</p>
                    </div>
                    <button onclick="book('${ev._id}', '${ev.title}')" class="w-full py-4 bg-purple-600/10 group-hover:bg-purple-600 text-purple-400 group-hover:text-white rounded-2xl text-[10px] font-bold uppercase tracking-widest transition-all">Secure Spot</button>
                </div>
            `).join('');
        }

        async function book(id, title) {
            const email = localStorage.getItem('userEmail');
            const { value: f } = await Swal.fire({
                title: 'New Registration',
                text: title,
                confirmButtonColor: '#9333ea',
                html: `
                    <div class="space-y-4 mt-6">
                        <input id="rn" class="swal2-input !m-0 !w-full" placeholder="Full Name">
                        <input id="rp" class="swal2-input !m-0 !w-full" placeholder="Mobile Number">
                        <input id="ro" class="swal2-input !m-0 !w-full" placeholder="Institute">
                    </div>`,
                preConfirm: () => ({ 
                    userName: document.getElementById('rn').value, 
                    userPhone: document.getElementById('rp').value, 
                    organization: document.getElementById('ro').value 
                })
            });
            if(f && f.userName) {
                await fetch(`${API}/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ eventId: id, userEmail: email, ...f })
                });
                Swal.fire({ icon: 'success', title: 'Confirmed', text: 'Registration Data Saved', confirmButtonColor: '#9333ea' });
            }
        }

        async function openAdmin() {
            const { value: action } = await Swal.fire({
                title: 'Control Center',
                input: 'select',
                inputOptions: { 
                    'add': '➕ Deploy Event', 
                    'view': '👥 Registry Data',
                    'delete': '🗑️ Erase Event' 
                },
                confirmButtonColor: '#9333ea'
            });

            if (action === 'add') {
                const { value: ev } = await Swal.fire({
                    title: 'Deploy New Event',
                    confirmButtonColor: '#9333ea',
                    html: `
                        <input id="at" class="swal2-input" placeholder="Title">
                        <input id="ac" class="swal2-input" placeholder="Category">
                        <textarea id="ad" class="swal2-textarea" placeholder="Event Logistics & Description"></textarea>`,
                    preConfirm: () => ({ 
                        title: document.getElementById('at').value, 
                        category: document.getElementById('ac').value, 
                        description: document.getElementById('ad').value 
                    })
                });
                if(ev && ev.title) { 
                    await fetch(`${API}/admin/add-event`, { 
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(ev) 
                    }); 
                    loadEvents();
                    Swal.fire('Success', 'Event Broadcasted', 'success');
                }
            } 
            else if (action === 'delete') {
                const res = await fetch(`${API}/events`);
                const events = await res.json();
                const eventOptions = {};
                events.forEach(ev => { eventOptions[ev._id] = ev.title; });

                const { value: eventId } = await Swal.fire({
                    title: 'Select Event to Erase', input: 'select', inputOptions: eventOptions,
                    confirmButtonColor: '#ef4444'
                });

                if (eventId) {
                    const confirm = await Swal.fire({ title: 'Confirm Erasure?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
                    if (confirm.isConfirmed) {
                        await fetch(`${API}/admin/delete-event/${eventId}`, { method: 'DELETE' });
                        loadEvents();
                        Swal.fire('Erazed', 'Removed from Cloud', 'success');
                    }
                }
            }
            else if (action === 'view') {
                const res = await fetch(`${API}/admin/registrations`);
                const data = await res.json();
                const list = data.map(r => `
                    <div class="p-4 border-b border-purple-500/10 text-[11px] text-left">
                        <p class="font-bold purple-glow">${r.userName} ➔ ${r.eventId?.title || 'Unknown'}</p>
                        <p class="text-slate-500 mt-1">${r.userEmail} | ${r.userPhone}</p>
                    </div>
                `).join('');
                Swal.fire({ title: 'Registry Records', html: `<div class="max-h-60 overflow-y-auto">${list || 'Zero entries found'}</div>` });
            }
        }

        async function viewMyEvents() {
            const email = localStorage.getItem('userEmail');
            const res = await fetch(`${API}/my-registrations/${email}`);
            const data = await res.json();
            const list = data.map(r => `
                <div class="p-4 border-b border-purple-500/10 text-xs text-left">
                    <p class="font-bold purple-glow">${r.eventId?.title || 'Inactive Event'}</p>
                    <p class="text-slate-500 mt-1">${r.organization}</p>
                </div>
            `).join('');
            Swal.fire({ title: 'Personal Schedule', html: list || 'No registrations recorded' });
        }

        function filterEvents() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderGrid(allEvents.filter(e => e.title.toLowerCase().includes(q) || e.category.toLowerCase().includes(q)));
        }
    </script>
</body>
</html>
